name: CI

on:
  push:
    branches: [main]
  pull_request:

# GitHub-hosted runners pull from Docker Hub without metering, while the
# default ECR Public mirror rate-limits anonymous pulls from shared CI IPs.
env:
  DOCKER_REGISTRY: docker.io/library

jobs:
  quality:
    name: Lint, static analysis, tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose build

      - name: Start stack
        run: docker compose up -d --wait

      - name: Install dependencies
        run: docker compose exec -T app composer install --no-interaction --no-progress

      - name: Code style
        run: docker compose exec -T app vendor/bin/php-cs-fixer fix --dry-run --diff

      - name: Static analysis
        run: docker compose exec -T app vendor/bin/phpstan analyse --no-progress

      - name: Tests
        run: docker compose exec -T app php bin/phpunit

  prod-image:
    name: Prod image compiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build prod target
        run: docker build -f docker/php/Dockerfile --target prod --build-arg REGISTRY=docker.io/library .
