services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: dev
    volumes:
      - ./app:/app
      # var/ (cache, logs, file storage) lives in a named volume: faster on
      # Windows/macOS hosts and survives container re-creation.
      - app_var:/app/var
    environment:
      MAILER_DSN: smtp://mailpit:1025
    depends_on:
      - mailpit
    healthcheck:
      test: ["CMD-SHELL", "pgrep php-fpm > /dev/null"]
      interval: 10s
      timeout: 3s
      retries: 5

  nginx:
    image: public.ecr.aws/docker/library/nginx:1.28-alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/public:/app/public:ro
    depends_on:
      - app
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

  mailpit:
    image: ghcr.io/axllent/mailpit:latest
    ports:
      - "8025:8025"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8025/livez"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  app_var:
