server {
    listen 80;
    server_name _;
    root /app/public;

    client_max_body_size 1m;

    # Container healthcheck target, independent of PHP.
    location = /healthz {
        access_log off;
        return 200 'ok';
    }

    # The landing page is a static index.html; everything else falls back to
    # the Symfony front controller.
    index index.html;

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass app:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /app/public/index.php;
        fastcgi_param DOCUMENT_ROOT /app/public;
        internal;
    }

    # Deny direct access to any other .php file.
    location ~ \.php$ {
        return 404;
    }
}
