# Render Blueprint: deploy straight from the GitHub repo.
# Render builds the Dockerfile's default (last) stage - `serve` - which runs
# php-fpm + Caddy in one container and listens on $PORT.
services:
  - type: web
    name: developer-landing-api
    runtime: docker
    plan: free
    dockerfilePath: ./docker/php/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: prod
      - key: APP_SECRET
        generateValue: true
      - key: CORS_ALLOW_ORIGIN
        value: '^https?://.*$'
      # Mail: point to your SMTP provider (e.g. smtp://user:pass@host:587)
      - key: MAILER_DSN
        sync: false
      - key: MAIL_OWNER
        sync: false
      # AI: set the key(s) you have; AI_PROVIDER=auto picks configured ones
      - key: AI_PROVIDER
        value: auto
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
